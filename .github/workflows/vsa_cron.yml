name: Hourly VSA Stock Scanner

on:
  workflow_dispatch: 

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5 # Upgraded to v5 for better compatibility
        with:
          python-version: '3.12'      # Upgraded to 3.12 to satisfy pandas-ta

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run VSA Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python vsa_scanner.py
